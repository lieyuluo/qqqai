services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: qqqai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - qqqai-etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: qqqai-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - qqqai-minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: qqqai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - qqqai-milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: qqqai-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - qqqai-elasticsearch:/usr/share/elasticsearch/data

  mysql:
    image: mysql:8.0
    container_name: qqqai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qqqai
    ports:
      - "3306:3306"
    volumes:
      - qqqai-mysql:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: qqqai-redis
    ports:
      - "6379:6379"
    volumes:
      - qqqai-redis:/data

volumes:
  qqqai-etcd:
  qqqai-minio:
  qqqai-milvus:
  qqqai-elasticsearch:
  qqqai-mysql:
  qqqai-redis:
