services:
  app:
    build: .
    container_name: qqqai-app
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: qqqai
      REDIS_ADDR: redis:6379
      MILVUS_ADDR: milvus:19530
      ELASTICSEARCH_ADDRESSES: http://elasticsearch:9200
      MEMORY_DIR: /app/data/memory
      UPLOAD_DIR: /app/data/uploads
    expose:
      - "8080"
    volumes:
      - qqqai-app-data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    container_name: qqqai-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
    expose:
      - "3000"
    depends_on:
      - app
    restart: unless-stopped

  proxy:
    build: ./deploy/nginx
    container_name: qqqai-proxy
    ports:
      - "80:80"
    depends_on:
      - app
      - web
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: qqqai-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - qqqai-etcd:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: qqqai-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - qqqai-minio:/minio_data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: qqqai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - qqqai-milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: qqqai-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - qqqai-elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: qqqai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qqqai
    volumes:
      - qqqai-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: qqqai-redis
    volumes:
      - qqqai-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  qqqai-app-data:
  qqqai-etcd:
  qqqai-minio:
  qqqai-milvus:
  qqqai-elasticsearch:
  qqqai-mysql:
  qqqai-redis:
