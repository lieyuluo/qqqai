name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm install
        working-directory: .

      - name: Install web dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build web app
        run: npm run build
