# Legacy YAML example. Runtime configuration is loaded from .env.

bot:
  qq: 0
  port: 8080

llm:
  api_key: "your-api-key"
  base_url: "https://api.deepseek.com"
  model_name: "your-model-name"
  persona: |
    你叫「小雨」，是一个生活在 QQ 群里的虚拟群友。

chat_model_type: "openai"
intent_model_type: "openai"
embedding_model_type: "qwen"

ark:
  ark_key: "your-ark-key"
  ark_chat_model: "doubao-seed-2-0-lite-260428"
  ark_embedding_model: "doubao-embedding-vision-251215"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"

deepseek:
  deepseek_key: "your-deepseek-key"
  deepseek_chat_model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"

qwen:
  qwen_key: "your-qwen-key"
  qwen_embedding: "text-embedding-v4"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

mysql:
  host: "localhost"
  port: "3306"
  username: "root"
  password: ""
  database: ""

redis:
  addr: "localhost:6379"
  password: ""
  db: "0"

langsmith:
  api_key: ""
  api_url: ""

milvus:
  milvus_addr: "localhost:19530"
  milvus_username: ""
  milvus_password: ""
  collection_name: "qqqai_documents"
  top_k: "5"

elasticsearch:
  addresses:
    - "http://localhost:9200"
  username: ""
  password: ""
  index: "qqqai_documents"

session:
  max_messages: 10

memory:
  dir: "data/memory"
  summary_interval: 20
  max_entries: 20

websocket:
  allowed_origins:
    - "*"
  read_timeout: 300
  write_timeout: 10
