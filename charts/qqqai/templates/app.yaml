apiVersion: v1
kind: Service
metadata:
  name: {{ include "qqqai.fullname" . }}-app
  labels:
    {{- include "qqqai.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "qqqai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
---
{{- if and .Values.app.persistence.enabled (not .Values.app.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "qqqai.fullname" . }}-app-data
  labels:
    {{- include "qqqai.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.app.persistence.storageClassName }}
  storageClassName: {{ .Values.app.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.app.persistence.size | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qqqai.fullname" . }}-app
  labels:
    {{- include "qqqai.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "qqqai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "qqqai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: {{ include "qqqai.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          envFrom:
            - configMapRef:
                name: {{ include "qqqai.fullname" . }}-config
            - secretRef:
                name: {{ include "qqqai.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          {{- with .Values.app.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: app-data
          {{- if .Values.app.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-app-data" (include "qqqai.fullname" .)) .Values.app.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
