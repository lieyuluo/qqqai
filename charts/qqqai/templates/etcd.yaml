{{- if .Values.etcd.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qqqai.fullname" . }}-etcd
  labels:
    {{- include "qqqai.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  selector:
    {{- include "qqqai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qqqai.fullname" . }}-etcd
  labels:
    {{- include "qqqai.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  serviceName: {{ include "qqqai.fullname" . }}-etcd
  replicas: 1
  selector:
    matchLabels:
      {{- include "qqqai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        {{- include "qqqai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - name: etcd
          image: {{ .Values.etcd.image | quote }}
          command:
            - etcd
            - --advertise-client-urls=http://127.0.0.1:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - name: client
              containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.etcd.persistence.storageClassName }}
        storageClassName: {{ .Values.etcd.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.persistence.size | quote }}
{{- end }}
