nameOverride: ""
fullnameOverride: ""

image:
  repository: qqqai
  tag: latest
  pullPolicy: IfNotPresent

app:
  replicas: 1
  port: 8080
  memoryDir: /app/data/memory
  allowedOrigins: "*"
  readTimeout: 300
  writeTimeout: 10
  resources: {}
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

indexer:
  enabled: true
  url: ""
  minScale: "0"
  maxScale: "3"
  containerConcurrency: 4
  timeoutSeconds: 300
  resources: {}

ingress:
  enabled: false
  className: ""
  host: qqqai.example.com
  annotations: {}
  tls: []

config:
  botQQ: "0"
  chatModelType: openai
  intentModelType: openai
  embeddingModelType: ark
  llmPersona: ""
  sessionMaxMessages: "10"
  memorySummaryInterval: "20"
  memoryMaxEntries: "20"
  arkChatModel: doubao-seed-2-0-lite-260428
  arkEmbeddingModel: doubao-embedding-vision-251215
  deepseekChatModel: deepseek-v4-flash
  deepseekBaseURL: https://api.deepseek.com
  qwenEmbedding: text-embedding-v4
  qwenBaseURL: https://dashscope.aliyuncs.com/compatible-mode/v1
  napcatHTTPBaseURL: http://127.0.0.1:3000
  langsmithAPIURL: https://api.smith.langchain.com
  milvusCollectionName: qqqai_documents
  milvusTopK: "5"
  elasticsearchIndex: qqqai_documents

secrets:
  llmAPIKey: ""
  arkKey: ""
  deepseekKey: ""
  qwenKey: ""
  napcatAccessToken: ""
  langsmithAPIKey: ""

mysql:
  enabled: true
  image: mysql:8.0
  database: qqqai
  username: root
  password: root
  persistence:
    size: 8Gi
    storageClassName: ""

redis:
  enabled: true
  image: redis:7.4
  password: ""
  db: "0"
  persistence:
    size: 2Gi
    storageClassName: ""

etcd:
  enabled: true
  image: quay.io/coreos/etcd:v3.5.18
  persistence:
    size: 4Gi
    storageClassName: ""

minio:
  enabled: true
  image: minio/minio:RELEASE.2024-12-18T13-15-44Z
  rootUser: minioadmin
  rootPassword: minioadmin
  persistence:
    size: 10Gi
    storageClassName: ""

milvus:
  enabled: true
  image: milvusdb/milvus:v2.5.4
  persistence:
    size: 20Gi
    storageClassName: ""

elasticsearch:
  enabled: true
  image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
  javaOpts: -Xms512m -Xmx512m
  persistence:
    size: 10Gi
    storageClassName: ""
